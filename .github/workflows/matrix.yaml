name: Matrix
on:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21, 22, 23]
        browsers: [firefox,chrome, firefox]
    steps:
      - name: use Node version and test browser
        run: |
          echo "Node version: ${{ matrix.node-version }}"
          echo "Browser: ${{ matrix.browsers }}"