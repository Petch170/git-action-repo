name: Deploy React CSR
on:
  push:
    branches:
      - main
    #   - homepage
    # paths: 
    #   - 'src/**'
  workflow_dispatch:
  pull_request:
    types: 
        # event เกิด workflow จะดูว่าเป็น opened ไหม ถ้าเป็น opened จะทํางาน
      - opened
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm i
      - name: Lint
        run: npm run lint
  deploy:
    # needs:
    #   - lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm i
      - name: Build
        run: npm run build
      - name: List dist/
        run: ls dist
      - name: Deploy
        run: echo "Deploying..."
