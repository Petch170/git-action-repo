name: Deploy React CSR
on:
  push:
    branches:
      - main
      - features/** #ทุก branch ของ features จะทำงาน
    #   - "!features/authen"  #ถ้ามี ! จะไม่ทำงาน
  workflow_dispatch:
  pull_request:
    types:
      # event เกิด workflow จะดูว่าเป็น opened ไหม ถ้าเป็น opened จะทํางาน
      - opened
# env:
#   NPM_VERSION: "10.9.2"
jobs:
  build:
    #   lint:
    runs-on: ubuntu-latest
    steps:
      - name: Use env variable
        run: echo "npm version:{{ $NPM_VERSION}}"
      - name: Use repo variable
        run: echo "test URL:{{ vars.TEST_URL}}"
      - name: Clone repo
        uses: actions/checkout@v5
      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - uses: actions/cache@v4
        id: npm-cache # use this to check for `cache-hit` ==> if: steps.npm-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencie
        run: npm i
      #   - name: Lint
      #     run: npm run lint
      - name: Build
        run: npm run build
      - name: List dist/
        run: ls -l dist
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    # needs:
    #   - lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      #   - name: Clone repo
      #     uses: actions/checkout@v5
      #   - name: Install dependencies
      #     run: npm i
      #   - name: Builds
      #     run: npm run build
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/
      - name: List all files/
        run: ls dist
      - name: Deploy
        run: echo "Deployedssss.."
