name: Deploy React CSR
on:
  push:
    branches:
      - main
      - features/** #ทุก branch ของ features จะทำงาน
    #   - "!features/authen"  #ถ้ามี ! จะไม่ทำงาน
  workflow_dispatch:
  pull_request:
    types: 
        # event เกิด workflow จะดูว่าเป็น opened ไหม ถ้าเป็น opened จะทํางาน
      - opened
jobs:
  build:
#   lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm i
    #   - name: Lint
    #     run: npm run lint
      - name: Build
        run: npm run build
      - name: List dist/
        run: ls dist
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: build-folder
          path: dist/


  deploy:
    # needs:
    #   - lint
    runs-on: ubuntu-latest
    needs: build
    steps:
    #   - name: Clone repo
    #     uses: actions/checkout@v5
    #   - name: Install dependencies
    #     run: npm i
    #   - name: Build
    #     run: npm run build
     
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: build-folder
          path: dist/
      - name: List dist/
        run: ls dist
      - name: Deploy
        run : echo "Deployedssss.."
      
